# alembic.ini — Alembic configuration
# Run migrations: alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os  # default on all OS

# Database URL is read from environment via env.py — do NOT set sqlalchemy.url here.
# This keeps credentials out of version control.
sqlalchemy.url =

[post_write_hooks]
# Optional: auto-format migration files with ruff
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
